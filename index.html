<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>¡Cumpleaños de Mateo! 🕷️</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #E3000F;
    --blue: #003082;
    --darkblue: #001a4d;
    --yellow: #FFD700;
    --white: #ffffff;
  }
 
  * { margin: 0; padding: 0; box-sizing: border-box; }
 
  body {
    background-color: var(--darkblue);
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    cursor: crosshair;
  }
 
  /* Fondo telaraña animada */
  .web-bg {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
    opacity: 0.07;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 49px, rgba(255,255,255,0.5) 49px, rgba(255,255,255,0.5) 50px),
      repeating-linear-gradient(90deg, transparent, transparent 49px, rgba(255,255,255,0.5) 49px, rgba(255,255,255,0.5) 50px);
    background-size: 50px 50px;
    animation: webMove 20s linear infinite;
  }
 
  @keyframes webMove {
    0% { transform: translate(0,0); }
    100% { transform: translate(50px, 50px); }
  }
 
  /* Partículas flotantes */
  .particles {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
    pointer-events: none;
  }
 
  .particle {
    position: absolute;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    animation: float linear infinite;
  }
 
  @keyframes float {
    0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { transform: translateY(-100px) rotate(720deg); opacity: 0; }
  }
 
  /* Contenedor principal */
  .container {
    position: relative;
    z-index: 1;
    max-width: 480px;
    margin: 0 auto;
    padding: 20px;
  }
 
  /* Hero con Spiderman SVG */
  .hero {
    text-align: center;
    padding: 30px 0 10px;
    animation: fadeDown 0.8s ease both;
  }
 
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-40px); }
    to { opacity: 1; transform: translateY(0); }
  }
 
  .spider-icon {
    width: 120px;
    height: 120px;
    margin: 0 auto 10px;
    animation: spiderPulse 2s ease-in-out infinite;
    filter: drop-shadow(0 0 20px rgba(227,0,15,0.8));
  }
 
  @keyframes spiderPulse {
    0%, 100% { transform: scale(1); filter: drop-shadow(0 0 20px rgba(227,0,15,0.8)); }
    50% { transform: scale(1.08); filter: drop-shadow(0 0 35px rgba(227,0,15,1)); }
  }
 
  /* Tarjeta principal */
  .card {
    background: linear-gradient(145deg, var(--blue), var(--darkblue));
    border: 3px solid var(--red);
    border-radius: 24px;
    padding: 30px 24px;
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
    animation: fadeUp 0.8s ease 0.2s both;
    box-shadow: 0 0 40px rgba(227,0,15,0.3), inset 0 1px 0 rgba(255,255,255,0.1);
  }
 
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(40px); }
    to { opacity: 1; transform: translateY(0); }
  }
 
  .card::before {
    content: '';
    position: absolute;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: radial-gradient(circle at 30% 30%, rgba(227,0,15,0.08) 0%, transparent 60%);
    pointer-events: none;
  }
 
  /* Texto "¡TE INVITAMOS!" */
  .invite-label {
    font-family: 'Bangers', cursive;
    font-size: 16px;
    letter-spacing: 4px;
    color: var(--yellow);
    text-align: center;
    margin-bottom: 6px;
    opacity: 0.9;
  }
 
  /* Nombre del cumpleañero */
  .birthday-name {
    font-family: 'Bangers', cursive;
    font-size: 64px;
    line-height: 1;
    text-align: center;
    color: var(--white);
    text-shadow: 4px 4px 0 var(--red), 8px 8px 0 rgba(0,0,0,0.3);
    letter-spacing: 2px;
    animation: nameGlow 3s ease-in-out infinite;
  }
 
  @keyframes nameGlow {
    0%, 100% { text-shadow: 4px 4px 0 var(--red), 8px 8px 0 rgba(0,0,0,0.3); }
    50% { text-shadow: 4px 4px 0 var(--red), 8px 8px 0 rgba(0,0,0,0.3), 0 0 30px rgba(255,255,255,0.4); }
  }
 
  .birthday-age {
    font-family: 'Bangers', cursive;
    font-size: 28px;
    text-align: center;
    color: var(--yellow);
    letter-spacing: 3px;
    margin-bottom: 20px;
  }
 
  /* Separador telaraña */
  .divider {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 16px 0;
  }
  .divider-line {
    flex: 1;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--red), transparent);
  }
  .divider-icon { font-size: 18px; }
 
  /* Info del evento */
  .event-info {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
 
  .info-item {
    display: flex;
    align-items: center;
    gap: 14px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 14px;
    padding: 14px 16px;
    transition: transform 0.2s, background 0.2s;
  }
 
  .info-item:hover {
    transform: translateX(4px);
    background: rgba(227,0,15,0.1);
  }
 
  .info-icon {
    font-size: 28px;
    min-width: 36px;
    text-align: center;
  }
 
  .info-content { flex: 1; }
 
  .info-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--yellow);
    text-transform: uppercase;
    margin-bottom: 2px;
  }
 
  .info-value {
    font-size: 16px;
    font-weight: 700;
    color: var(--white);
  }
 
  /* Countdown */
  .countdown-card {
    background: linear-gradient(135deg, var(--red), #8b0000);
    border-radius: 20px;
    padding: 20px;
    text-align: center;
    margin-bottom: 16px;
    animation: fadeUp 0.8s ease 0.4s both;
    box-shadow: 0 8px 32px rgba(227,0,15,0.4);
  }
 
  .countdown-title {
    font-family: 'Bangers', cursive;
    font-size: 16px;
    letter-spacing: 3px;
    color: rgba(255,255,255,0.8);
    margin-bottom: 14px;
  }
 
  .countdown-grid {
    display: flex;
    justify-content: center;
    gap: 12px;
  }
 
  .countdown-item {
    background: rgba(0,0,0,0.3);
    border-radius: 12px;
    padding: 10px 16px;
    min-width: 64px;
  }
 
  .countdown-number {
    font-family: 'Bangers', cursive;
    font-size: 36px;
    color: var(--white);
    line-height: 1;
    display: block;
  }
 
  .countdown-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    color: rgba(255,255,255,0.6);
    text-transform: uppercase;
  }
 
  /* RSVP */
  .rsvp-card {
    background: linear-gradient(145deg, var(--blue), var(--darkblue));
    border: 3px solid var(--yellow);
    border-radius: 24px;
    padding: 24px;
    margin-bottom: 16px;
    animation: fadeUp 0.8s ease 0.6s both;
    box-shadow: 0 0 30px rgba(255,215,0,0.2);
  }
 
  .rsvp-title {
    font-family: 'Bangers', cursive;
    font-size: 24px;
    color: var(--yellow);
    text-align: center;
    letter-spacing: 2px;
    margin-bottom: 16px;
  }
 
  .rsvp-input {
    width: 100%;
    background: rgba(255,255,255,0.08);
    border: 2px solid rgba(255,255,255,0.15);
    border-radius: 12px;
    padding: 14px 16px;
    color: var(--white);
    font-family: 'Nunito', sans-serif;
    font-size: 15px;
    font-weight: 700;
    margin-bottom: 12px;
    outline: none;
    transition: border-color 0.2s;
  }
 
  .rsvp-input:focus {
    border-color: var(--yellow);
  }
 
  .rsvp-input::placeholder { color: rgba(255,255,255,0.35); }
 
  .rsvp-buttons {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 12px;
  }
 
  .btn-confirm {
    background: linear-gradient(135deg, #00c853, #007a33);
    border: none;
    border-radius: 12px;
    padding: 14px;
    color: white;
    font-family: 'Bangers', cursive;
    font-size: 18px;
    letter-spacing: 1px;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 15px rgba(0,200,83,0.3);
  }
 
  .btn-decline {
    background: linear-gradient(135deg, #555, #333);
    border: none;
    border-radius: 12px;
    padding: 14px;
    color: white;
    font-family: 'Bangers', cursive;
    font-size: 18px;
    letter-spacing: 1px;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
  }
 
  .btn-confirm:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,200,83,0.5); }
  .btn-decline:hover { transform: translateY(-2px); }
  .btn-confirm:active, .btn-decline:active { transform: translateY(0); }
 
  /* Mensaje de confirmación */
  .rsvp-message {
    display: none;
    text-align: center;
    padding: 14px;
    border-radius: 12px;
    font-weight: 700;
    font-size: 15px;
    animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
  }
 
  @keyframes popIn {
    from { opacity: 0; transform: scale(0.7); }
    to { opacity: 1; transform: scale(1); }
  }
 
  .rsvp-message.confirmed {
    background: rgba(0,200,83,0.15);
    border: 2px solid rgba(0,200,83,0.4);
    color: #00e676;
  }
 
  .rsvp-message.declined {
    background: rgba(150,150,150,0.15);
    border: 2px solid rgba(150,150,150,0.3);
    color: #bbb;
  }
 
  /* Footer Bether */
  .footer {
    text-align: center;
    padding: 10px 0 30px;
    animation: fadeUp 0.8s ease 0.8s both;
  }
 
  .footer-brand {
    font-family: 'Bangers', cursive;
    font-size: 13px;
    letter-spacing: 3px;
    color: rgba(255,255,255,0.25);
  }
 
  .footer-brand span {
    color: rgba(255,215,0,0.5);
  }
 
  /* Web shooter effect on click */
  .web-shot {
    position: fixed;
    pointer-events: none;
    z-index: 9999;
    font-size: 24px;
    animation: webShot 0.8s ease forwards;
  }
 
  @keyframes webShot {
    0% { opacity: 1; transform: scale(0.5); }
    50% { opacity: 1; transform: scale(1.5); }
    100% { opacity: 0; transform: scale(2); }
  }
</style>
</head>
<body>
 
<div class="web-bg"></div>
<div class="particles" id="particles"></div>
 
<div class="container">
 
  <!-- Hero -->
  <div class="hero">
    <!-- Spiderman SVG logo -->
    <svg class="spider-icon" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="60" cy="60" r="58" fill="#E3000F" stroke="#001a4d" stroke-width="3"/>
      <!-- Máscara Spiderman simplificada -->
      <ellipse cx="60" cy="50" rx="28" ry="22" fill="#003082"/>
      <ellipse cx="47" cy="46" rx="10" ry="8" fill="white" opacity="0.9"/>
      <ellipse cx="73" cy="46" rx="10" ry="8" fill="white" opacity="0.9"/>
      <ellipse cx="47" cy="46" rx="7" ry="5.5" fill="#003082"/>
      <ellipse cx="73" cy="46" rx="7" ry="5.5" fill="#003082"/>
      <!-- Líneas telaraña en cara -->
      <path d="M32 36 Q60 28 88 36" stroke="#001a4d" stroke-width="1.5" fill="none"/>
      <path d="M35 42 Q60 35 85 42" stroke="#001a4d" stroke-width="1.5" fill="none"/>
      <path d="M60 24 L60 72" stroke="#001a4d" stroke-width="1.5"/>
      <path d="M38 28 Q49 50 38 72" stroke="#001a4d" stroke-width="1.5" fill="none"/>
      <path d="M82 28 Q71 50 82 72" stroke="#001a4d" stroke-width="1.5" fill="none"/>
      <!-- Araña en pecho -->
      <g transform="translate(60,82)">
        <ellipse cx="0" cy="-3" rx="6" ry="4" fill="#001a4d"/>
        <ellipse cx="0" cy="4" rx="8" ry="5" fill="#001a4d"/>
        <line x1="-14" y1="-2" x2="-6" y2="0" stroke="#001a4d" stroke-width="2"/>
        <line x1="14" y1="-2" x2="6" y2="0" stroke="#001a4d" stroke-width="2"/>
        <line x1="-16" y1="4" x2="-8" y2="3" stroke="#001a4d" stroke-width="2"/>
        <line x1="16" y1="4" x2="8" y2="3" stroke="#001a4d" stroke-width="2"/>
        <line x1="-12" y1="10" x2="-7" y2="7" stroke="#001a4d" stroke-width="2"/>
        <line x1="12" y1="10" x2="7" y2="7" stroke="#001a4d" stroke-width="2"/>
      </g>
    </svg>
  </div>
 
  <!-- Tarjeta principal -->
  <div class="card">
    <div class="invite-label">⚡ ¡TE INVITAMOS! ⚡</div>
    <div class="birthday-name">BETIANA</div>
    <div class="birthday-age">🎉 ¡CUMPLE 6 AÑOS! 🎉</div>
 
    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-icon">🕷️</div>
      <div class="divider-line"></div>
    </div>
 
    <div class="event-info">
      <div class="info-item">
        <div class="info-icon">📅</div>
        <div class="info-content">
          <div class="info-label">Fecha</div>
          <div class="info-value">Sábado 25 de Abril</div>
        </div>
      </div>
      <div class="info-item">
        <div class="info-icon">🕓</div>
        <div class="info-content">
          <div class="info-label">Hora</div>
          <div class="info-value">16:00 hs</div>
        </div>
      </div>
      <div class="info-item">
        <div class="info-icon">📍</div>
        <div class="info-content">
          <div class="info-label">Lugar</div>
          <div class="info-value">Salón "El Castillo"<br><span style="font-size:13px; font-weight:400; opacity:0.7">Av. Siempre Viva 123</span></div>
        </div>
      </div>
    </div>
  </div>
 
  <!-- Countdown -->
  <div class="countdown-card">
    <div class="countdown-title">⏱️ FALTAN...</div>
    <div class="countdown-grid">
      <div class="countdown-item">
        <span class="countdown-number" id="days">--</span>
        <span class="countdown-label">Días</span>
      </div>
      <div class="countdown-item">
        <span class="countdown-number" id="hours">--</span>
        <span class="countdown-label">Horas</span>
      </div>
      <div class="countdown-item">
        <span class="countdown-number" id="minutes">--</span>
        <span class="countdown-label">Min</span>
      </div>
      <div class="countdown-item">
        <span class="countdown-number" id="seconds">--</span>
        <span class="countdown-label">Seg</span>
      </div>
    </div>
  </div>
 
  <!-- RSVP -->
  <div class="rsvp-card">
    <div class="rsvp-title">🕸️ ¿VENÍS AL CUMPLE?</div>
    <input type="text" class="rsvp-input" id="guestName" placeholder="Tu nombre completo" maxlength="40"/>
    <div class="rsvp-buttons">
      <button class="btn-confirm" onclick="confirmRSVP(true)">✅ ¡SÍ VOY!</button>
      <button class="btn-decline" onclick="confirmRSVP(false)">❌ No puedo</button>
    </div>
    <div class="rsvp-message" id="rsvpMessage"></div>
  </div>
 
  <!-- Footer -->
  <div class="footer">
    <div class="footer-brand">Creado con ❤️ por <span>BETHER</span></div>
  </div>
 
</div>
 
<script>
  // Partículas flotantes
  const colors = ['#E3000F', '#FFD700', '#003082', '#ffffff'];
  const emojis = ['🕷️', '⭐', '✨', '🕸️'];
  const container = document.getElementById('particles');
 
  for (let i = 0; i < 18; i++) {
    const el = document.createElement('div');
    const useEmoji = Math.random() > 0.5;
    if (useEmoji) {
      el.style.fontSize = (12 + Math.random() * 14) + 'px';
      el.style.background = 'transparent';
      el.style.width = 'auto';
      el.style.height = 'auto';
      el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    } else {
      el.className = 'particle';
      el.style.background = colors[Math.floor(Math.random() * colors.length)];
    }
    el.style.position = 'absolute';
    el.style.left = (Math.random() * 100) + '%';
    el.style.animationDuration = (8 + Math.random() * 14) + 's';
    el.style.animationDelay = (Math.random() * 10) + 's';
    el.style.animationName = 'float';
    el.style.animationTimingFunction = 'linear';
    el.style.animationIterationCount = 'infinite';
    container.appendChild(el);
  }
 
  // Countdown
  function updateCountdown() {
    const event = new Date('2026-04-25T16:00:00');
    const now = new Date();
    const diff = event - now;
 
    if (diff <= 0) {
      document.getElementById('days').textContent = '🎉';
      document.getElementById('hours').textContent = '🎂';
      document.getElementById('minutes').textContent = '🕷️';
      document.getElementById('seconds').textContent = '⭐';
      return;
    }
 
    const d = Math.floor(diff / (1000 * 60 * 60 * 24));
    const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
    const s = Math.floor((diff % (1000 * 60)) / 1000);
 
    document.getElementById('days').textContent = String(d).padStart(2,'0');
    document.getElementById('hours').textContent = String(h).padStart(2,'0');
    document.getElementById('minutes').textContent = String(m).padStart(2,'0');
    document.getElementById('seconds').textContent = String(s).padStart(2,'0');
  }
 
  updateCountdown();
  setInterval(updateCountdown, 1000);
 
  // RSVP
  function confirmRSVP(attending) {
    const name = document.getElementById('guestName').value.trim();
    const msg = document.getElementById('rsvpMessage');
 
    if (!name) {
      document.getElementById('guestName').style.borderColor = '#E3000F';
      document.getElementById('guestName').placeholder = '¡Primero escribí tu nombre!';
      setTimeout(() => {
        document.getElementById('guestName').style.borderColor = 'rgba(255,255,255,0.15)';
        document.getElementById('guestName').placeholder = 'Tu nombre completo';
      }, 2000);
      return;
    }
 
    msg.style.display = 'block';
    if (attending) {
      msg.className = 'rsvp-message confirmed';
      msg.innerHTML = `🕷️ ¡Genial, <strong>${name}</strong>!<br>¡Te esperamos en el cumple de Betiana! 🎉`;
    } else {
      msg.className = 'rsvp-message declined';
      msg.innerHTML = `😢 ¡Qué lástima, <strong>${name}</strong>!<br>Betiana te va a extrañar...`;
    }
 
    document.querySelector('.rsvp-buttons').style.display = 'none';
    document.getElementById('guestName').style.display = 'none';
  }
 
  // Web shooter click effect
  document.addEventListener('click', (e) => {
    const el = document.createElement('div');
    el.className = 'web-shot';
    el.textContent = '🕸️';
    el.style.left = (e.clientX - 15) + 'px';
    el.style.top = (e.clientY - 15) + 'px';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 800);
  });
</script>
</body>
</html>
