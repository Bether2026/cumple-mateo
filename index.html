<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invitación Spider 🕷️</title>

<style>
:root {
  --red:#E3000F;
  --blue:#003082;
  --darkblue:#001a4d;
  --yellow:#FFD700;
  --white:#ffffff;
}

body{
  margin:0;
  font-family:'Arial';
  background:var(--darkblue);
  overflow:hidden;
}

/* INTRO SOBRE */
#intro{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:radial-gradient(circle,#001a4d,#000);
  color:white;
  cursor:pointer;
  text-align:center;
}

#intro img{
  width:180px;
  animation:pulse 2s infinite;
}

@keyframes pulse{
  0%,100%{transform:scale(1);}
  50%{transform:scale(1.1);}
}

.fadeOut{
  animation:fadeOut .6s forwards;
}

@keyframes fadeOut{
  to{opacity:0;transform:scale(1.3);}
}

/* CONTENIDO ORIGINAL */
#contenido{
  display:none;
  height:100vh;
  overflow-y:auto;
}

.container{
  max-width:480px;
  margin:auto;
  padding:20px;
  text-align:center;
}

.card{
  background:linear-gradient(145deg,var(--blue),var(--darkblue));
  border:3px solid var(--red);
  border-radius:20px;
  padding:25px;
  margin-top:20px;
}

h1{
  font-size:50px;
  color:white;
}

.btn{
  margin-top:15px;
  padding:12px 18px;
  border:none;
  border-radius:10px;
  background:#00c853;
  color:white;
  cursor:pointer;
  font-size:16px;
}

</style>
</head>

<body>

<!-- INTRO -->
<div id="intro" onclick="abrirInvitacion()">
  <img src="https://cdn-icons-png.flaticon.com/512/646/646094.png">
  <p>🕷️ Tocá para abrir la invitación</p>
</div>

<!-- CONTENIDO REAL -->
<div id="contenido">

<div class="container">

  <div id="saludo"></div>

  <div class="card">
    <h1>MATEO</h1>
    <h3 style="color:gold;">🎉 Cumple 6 años 🎉</h3>

    <p>📅 Sábado 25 de Abril</p>
    <p>🕓 16:00 hs</p>
    <p>📍 Salón El Castillo</p>

    <button class="btn" onclick="confirmar()">Confirmar por WhatsApp</button>
  </div>

</div>

</div>

<!-- AUDIO -->
<audio id="sonido">
  <source src="https://assets.mixkit.co/sfx/preview/mixkit-fast-woosh-transition-3108.mp3">
</audio>

<script>

// ABRIR SOBRE
function abrirInvitacion(){
  document.getElementById("sonido").play();

  const intro=document.getElementById("intro");
  intro.classList.add("fadeOut");

  setTimeout(()=>{
    intro.style.display="none";
    document.getElementById("contenido").style.display="block";
  },600);
}

// NOMBRE PERSONALIZADO
const params=new URLSearchParams(window.location.search);
const nombre=params.get("nombre");

if(nombre){
  document.getElementById("saludo").innerHTML=
  `<h2 style="color:gold;">👋 Hola ${nombre}</h2>`;
}

// WHATSAPP
function confirmar(){
  const mensaje=`Hola! Soy ${nombre || "invitado"} y confirmo asistencia al cumple 🎉`;
  const telefono="549XXXXXXXXXX";

  window.open(`https://wa.me/${telefono}?text=${encodeURIComponent(mensaje)}`,'_blank');
}

</script>

</body>
</html>
