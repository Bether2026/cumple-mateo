<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invitación Spider 🕷️</title>

<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">

<style>
:root {
  --red:#E3000F;
  --blue:#003082;
  --darkblue:#001a4d;
  --yellow:#FFD700;
}

/* BODY */
body{
  margin:0;
  font-family:'Nunito',sans-serif;
  background:var(--darkblue);
  overflow:hidden;
}

/* ===== SOBRE ===== */
#sobre{
  position:fixed;
  width:100%;
  height:100%;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.envelope{
  width:260px;
  height:160px;
  background:#111;
  position:relative;
  cursor:pointer;
  perspective:1000px;
}

/* tapa */
.flap{
  position:absolute;
  width:100%;
  height:100%;
  background:linear-gradient(135deg,#003082,#001a4d);
  clip-path:polygon(0 0,100% 0,50% 70%);
  transform-origin:top;
  transition:transform 0.8s ease;
}

/* cuerpo */
.body{
  position:absolute;
  width:100%;
  height:100%;
  background:linear-gradient(145deg,#003082,#001a4d);
  border:2px solid #E3000F;
}

/* efecto abierto */
.open .flap{
  transform:rotateX(180deg);
}

/* TEXTO */
#sobre p{
  position:absolute;
  bottom:-50px;
  color:white;
}

/* ===== CONTENIDO ===== */
#contenido{
  display:none;
  overflow-y:auto;
  height:100vh;
}

/* fondo telaraña */
.web-bg{
  position:fixed;
  width:100%;
  height:100%;
  opacity:0.07;
  background-image:
  repeating-linear-gradient(0deg,transparent,transparent 49px,white 50px),
  repeating-linear-gradient(90deg,transparent,transparent 49px,white 50px);
  background-size:50px 50px;
  animation:webMove 20s linear infinite;
}

@keyframes webMove{
  to{transform:translate(50px,50px);}
}

.container{
  position:relative;
  z-index:1;
  max-width:480px;
  margin:auto;
  padding:20px;
  text-align:center;
}

/* CARD */
.card{
  background:linear-gradient(145deg,#003082,#001a4d);
  border:3px solid #E3000F;
  border-radius:20px;
  padding:25px;
}

h1{
  font-family:'Bangers';
  font-size:60px;
  color:white;
}

/* BOTON MUSICA */
.music-btn{
  position:fixed;
  top:10px;
  right:10px;
  background:#000000aa;
  color:white;
  border:none;
  padding:10px;
  border-radius:10px;
  cursor:pointer;
  z-index:10;
}

</style>
</head>

<body>

<!-- SOBRE -->
<div id="sobre">
  <div class="envelope" onclick="abrir()">
    <div class="flap"></div>
    <div class="body"></div>
  </div>
  <p>🕷️ Tocá para abrir</p>
</div>

<!-- CONTENIDO -->
<div id="contenido">

<div class="web-bg"></div>

<button class="music-btn" onclick="toggleMusic()">🔊 Música</button>

<div class="container">

<div id="saludo"></div>

<div class="card">
<h1>MATEO</h1>
<h3 style="color:gold;">🎉 Cumple 6 años 🎉</h3>
<p>📅 25 Abril</p>
<p>🕓 16:00 hs</p>
<p>📍 Salón El Castillo</p>
</div>

</div>
</div>

<!-- AUDIO -->
<audio id="openSound">
<source src="https://assets.mixkit.co/sfx/preview/mixkit-fast-woosh-transition-3108.mp3">
</audio>

<audio id="bgMusic" loop>
<source src="https://assets.mixkit.co/music/preview/mixkit-kids-party-132.mp3">
</audio>

<script>

// abrir sobre
function abrir(){
document.querySelector(".envelope").classList.add("open");

document.getElementById("openSound").play();

setTimeout(()=>{
document.getElementById("sobre").style.display="none";
document.getElementById("contenido").style.display="block";
document.getElementById("bgMusic").play();
},900);
}

// nombre personalizado
const params=new URLSearchParams(window.location.search);
const nombre=params.get("nombre");

if(nombre){
document.getElementById("saludo").innerHTML=`<h2 style="color:gold;">Hola ${nombre} 👋</h2>`;
}

// toggle musica
function toggleMusic(){
const music=document.getElementById("bgMusic");

if(music.paused){
music.play();
}else{
music.pause();
}
}

</script>

</body>
</html>
